{% extends "base_bootstrap_jquery.html" %}
{% block title %}Password Reset Request — ICT Support{% endblock %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h3 class="card-title mb-4">Forgot Password</h3>
                    <form method="post">
                        {% csrf_token %}
                        {{ form.email.label_tag }}
                        {{ form.email }}
                        {% if form.email.errors %}
                        <div class="text-danger">{{ form.email.errors }}</div>
                        {% endif %}
                        <button type="submit" class="btn btn-primary mt-3 w-100">Send Reset Link</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
